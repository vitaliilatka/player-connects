<!-- PLAYERS -->
<div class="tab-pane fade show active" id="playersTab">

  <!-- ADD PLAYER -->
  <div class="card mb-3">
    <div class="card-body p-2">
      <form id="addPlayerForm" class="row g-2 align-items-end">

        <div class="col-md-2">
          <label>Name</label>
          <input name="name" required class="form-control form-control-sm">
        </div>

        <div class="col-md-2">
          <label>Team</label>
          <input name="team" required class="form-control form-control-sm">
        </div>

        <div class="col-md-1">
          <label>Pos</label>
          <select name="position" required class="form-select form-select-sm">
            <option value="">—</option>
            <option value="GK">GK</option>
            <option value="DEF">DEF</option>
            <option value="MID">MID</option>
            <option value="FW">FW</option>
          </select>
        </div>

        <div class="col-md-2">
          <label>Image</label>
          <input type="file" name="image" class="form-control form-control-sm">
        </div>

        <div class="col-md-1">
          <button class="btn btn-success btn-sm">Add</button>
        </div>

      </form>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="card-body p-2">
      <div class="table-responsive">
        <table class="table table-sm table-striped text-center">
          <thead class="table-light">
            <tr>
              <th></th>
              <th>Name</th>
              <th>Team</th>
              <th>Pos</th>
              <th><i class="fa-solid fa-gamepad"></i></th>
              <th><i class="fa-solid fa-futbol text-success"></i></th>
              <th><i class="fa-solid fa-arrow-right-long text-primary"></i></th>
              <th><i class="fa-solid fa-shield-halved"></i></th>
              <th><i class="fa-solid fa-hand text-warning"></i></th>
              <th><i class="fa-solid fa-broom text-info"></i></th>
              <th><i class="fa-solid fa-futbol text-danger"></i></th>
              <th>⭐</th>
              <th>Rating</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="playersTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- MATCHES -->
<div class="tab-pane fade" id="matchesTab">

  <div class="card mb-3">
    <div class="card-body">

      <form id="createMatchForm" class="row g-2">

        <div class="col-md-2">
          <select name="matchday" class="form-select form-select-sm" required>
            <option value="">Matchday...</option>
          </select>
        </div>

        <div class="col-md-3">
          <label>Home Team</label>
          <select id="homeTeamSelect" class="form-select form-select-sm" required></select>
        </div>

        <div class="col-md-3">
          <label>Away Team</label>
          <select id="awayTeamSelect" class="form-select form-select-sm" required></select>
        </div>

        <div class="col-md-2">
          <label>Date</label>
          <input type="date" name="date" class="form-control form-control-sm" required>
        </div>

        <div class="col-md-2">
          <label>Time</label>
          <input type="time" name="time" class="form-control form-control-sm" required>
        </div>

        <div class="col-md-12">
          <button class="btn btn-primary btn-sm mt-2">
            <i class="fa-solid fa-plus"></i> Create Match
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

<!-- LINEUP -->
<div class="tab-pane fade" id="lineupTab">
  <div class="card p-3">Lineup UI (next step)</div>
</div>

<!-- RESULTS -->
<div class="tab-pane fade" id="resultsTab">
  <div class="card p-3">Results UI (next step)</div>
</div>
