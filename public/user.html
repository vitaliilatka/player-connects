<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fantasy Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f0fe,#f6f9ff);
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.pitch{
background:#2e7d32;
border-radius:12px;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.line{
display:flex;
justify-content:center;
gap:12px;
}

.player-slot{
background:white;
border-radius:8px;
padding:8px;
width:90px;
height:60px;
text-align:center;
cursor:pointer;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.subs{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.player-item{
padding:6px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.player-item:hover{
background:#f0f0f0;
}

</style>

</head>

<body class="container py-4">

<div class="topbar">

<h3>⚽ Fantasy Dashboard</h3>

<div>

<span id="userInfo" class="me-3"></span>

<button class="btn btn-sm btn-outline-success" onclick="loadLeaderboard()">
Leaderboard
</button>

<button class="btn btn-sm btn-outline-primary" onclick="loadHistory()">
History
</button>

<button id="logoutBtn" class="btn btn-sm btn-outline-danger">
Logout
</button>

</div>

</div>

<!-- USER RATING -->
<div class="card p-3 mb-3">
<h5>Your Rating</h5>

<div id="userRating"></div>

</div>

<!-- NEXT MATCH -->
<div class="card p-3 mb-3">

<h5>Next Match</h5>
<div id="nextMatchInfo"></div>

</div>

<div class="row">

<div class="col-md-6">

<div class="card p-3">

<h6>Predict Lineup (1-4-4-2)</h6>

<div class="pitch">

<div class="line" id="gk"></div>
<div class="line" id="def"></div>
<div class="line" id="mid"></div>
<div class="line" id="att"></div>

</div>

<h6 class="mt-3">Substitutions</h6>
<div class="subs" id="subs"></div>

<button class="btn btn-success mt-3 w-100" onclick="submitLineup()">
Submit Lineup
</button>

</div>

</div>

<div class="col-md-6">

<div class="card p-3">

<h6>Result Prediction</h6>

<input id="homeScore" class="form-control mb-2" placeholder="Home goals">
<input id="awayScore" class="form-control mb-2" placeholder="Away goals">

<button class="btn btn-primary w-100 mb-3" onclick="generateGoals()">
Generate Goals
</button>

<div id="goalInputs"></div>

<h6 class="mt-3">Man Of The Match</h6>

<button class="btn btn-outline-secondary w-100" onclick="selectMotm()">
Select MOTM
</button>

<div id="motmName" class="mt-2"></div>

<button class="btn btn-success w-100 mt-3" onclick="submitResult()">
Submit Result
</button>

</div>

</div>

</div>


<!-- PLAYER MODAL -->

<div class="modal fade" id="playerModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Select Player</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<div id="modalPlayerList"></div>
</div>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/user.js"></script>

</body>
</html>
