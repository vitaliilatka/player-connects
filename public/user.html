<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f0fe,#f6f9ff);
min-height:100vh;
}

.card{
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.section-title{
margin-bottom:15px;
font-weight:600;
}

.topbar{
position:absolute;
top:15px;
right:20px;
display:flex;
gap:10px;
align-items:center;
}

</style>

</head>

<body class="py-4">

<div class="topbar">
<span id="welcomeUser"></span>
<button class="btn btn-sm btn-outline-danger" id="logoutBtn">Logout</button>
</div>

<div class="container">

<h1 class="text-center mb-4">⚽ Fantasy Dashboard</h1>

<div class="row g-4">

<div class="col-lg-6">
<div class="card p-3">
<h5 class="section-title">Next Match</h5>
<div id="nextMatch"></div>
</div>
</div>

<div class="col-lg-6">
<div class="card p-3">
<h5 class="section-title">Leaderboard</h5>
<div id="leaderboard"></div>
</div>
</div>

<div class="col-12">
<div class="card p-3">
<h5 class="section-title">Players</h5>
<div class="row g-3" id="players"></div>
</div>
</div>

</div>

</div>

<script src="user.js"></script>

</body>
</html>
