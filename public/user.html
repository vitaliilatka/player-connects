<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f0fe,#f6f9ff);
min-height:100vh;
}

.topbar{
display:flex;
justify-content:flex-end;
gap:20px;
margin-bottom:20px;
}

.card{
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.section-title{
font-weight:600;
margin-bottom:10px;
}

.pitch{
background:#2e7d32;
padding:20px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.player-slot{
background:white;
border-radius:8px;
padding:10px;
text-align:center;
cursor:pointer;
min-height:60px;
}

.subs{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.player-list{
max-height:500px;
overflow-y:auto;
}

.player-item{
padding:6px;
cursor:pointer;
}

.player-item:hover{
background:#eee;
}

</style>

</head>

<body class="container py-4">

<h2 class="text-center mb-4">User Dashboard</h2>

<div class="topbar">

<div id="userInfo"></div>

<button id="logoutBtn" class="btn btn-outline-danger btn-sm">
Logout
</button>

</div>



<!-- NEXT MATCH -->

<div class="card p-3 mb-4">

<h5 class="section-title">Next Game</h5>

<div id="nextMatchInfo"></div>

</div>



<div class="row">

<!-- PLAYER LIST -->

<div class="col-md-3">

<div class="card p-3">

<h6>Players</h6>

<div id="playerList" class="player-list"></div>

</div>

</div>



<!-- PITCH -->

<div class="col-md-6">

<div class="card p-3">

<h6 class="section-title">Predict Lineup</h6>

<div class="pitch" id="pitch"></div>

<h6 class="mt-3">Substitutions</h6>

<div class="subs" id="subs"></div>

</div>

</div>



<!-- RESULT PREDICT -->

<div class="col-md-3">

<div class="card p-3">

<h6 class="section-title">Result Predict</h6>

<div class="mb-2">

<input id="homeScore" class="form-control" placeholder="Home goals">

</div>

<div class="mb-2">

<input id="awayScore" class="form-control" placeholder="Away goals">

</div>

<button class="btn btn-primary w-100" onclick="buildGoalInputs()">
Generate Goals
</button>

<hr>

<div id="goalInputs"></div>

</div>

</div>

</div>



<script>

let token=localStorage.getItem("token");

let selectedPlayer=null;

let squad=[];

let lineup=new Array(11).fill(null);

let subs=new Array(5).fill(null);

let currentMatch=null;



/* DASHBOARD LOAD */

async function loadDashboard(){

if(!token){

window.location.href="/";

return;

}

const res=await fetch("/user/dashboard",{

headers:{Authorization:"Bearer "+token}

});

const data=await res.json();

document.getElementById("userInfo").innerText=

data.user.username+" | Team: "+(data.user.selectedTeam||"not selected");

currentMatch=data.nextMatch;

if(!currentMatch){

document.getElementById("nextMatchInfo").innerHTML="No upcoming match";

return;

}

const kickoff=new Date(currentMatch.kickoff);

const deadline=new Date(kickoff.getTime()-90*60*1000);

document.getElementById("nextMatchInfo").innerHTML=`

<div>Matchday ${currentMatch.matchday}</div>

<div>${kickoff.toLocaleString()}</div>

<div>Deadline: ${deadline.toLocaleString()}</div>

<div><strong>${currentMatch.homeTeam} vs ${currentMatch.awayTeam}</strong></div>

`;

loadSquad(data.user.selectedTeam);

buildPitch();

buildSubs();

}



/* LOAD SQUAD */

async function loadSquad(team){

const res=await fetch("/players/team/"+team);

squad=await res.json();

renderPlayers();

}



/* PLAYER LIST */

function renderPlayers(){

const list=document.getElementById("playerList");

list.innerHTML="";

squad.forEach(p=>{

const div=document.createElement("div");

div.className="player-item";

div.innerText=p.name;

div.onclick=()=>{

selectedPlayer=p;

};

list.appendChild(div);

});

}



/* BUILD PITCH */

function buildPitch(){

const pitch=document.getElementById("pitch");

pitch.innerHTML="";

for(let i=0;i<11;i++){

const slot=document.createElement("div");

slot.className="player-slot";

slot.innerText=lineup[i]?.name||"empty";

slot.onclick=()=>{

if(selectedPlayer){

lineup[i]=selectedPlayer;

buildPitch();

}

};

pitch.appendChild(slot);

}

}



/* BUILD SUBS */

function buildSubs(){

const s=document.getElementById("subs");

s.innerHTML="";

for(let i=0;i<5;i++){

const slot=document.createElement("div");

slot.className="player-slot";

slot.innerText=subs[i]?.name||"empty";

slot.onclick=()=>{

if(selectedPlayer){

subs[i]=selectedPlayer;

buildSubs();

}

};

s.appendChild(slot);

}

}



/* GOAL INPUTS */

function buildGoalInputs(){

const home=parseInt(document.getElementById("homeScore").value||0);

const container=document.getElementById("goalInputs");

container.innerHTML="";

for(let i=0;i<home;i++){

container.innerHTML+=`

<div class="mb-2">

Goal ${i+1}

<select class="form-select mb-1">

${squad.map(p=>`<option value="${p._id}">${p.name}</option>`).join("")}

</select>

<input class="form-control mb-1" placeholder="Assist player">

<label><input type="checkbox"> Penalty</label>

</div>

`;

}

}



/* LOGOUT */

document.getElementById("logoutBtn").onclick=()=>{

localStorage.removeItem("token");

window.location.href="/";

};



loadDashboard();

</script>

</body>

</html>
