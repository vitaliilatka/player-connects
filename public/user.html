<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f0fe,#f6f9ff);
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.pitch{
background:#2e7d32;
padding:20px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.player-slot{
background:white;
border-radius:8px;
padding:10px;
text-align:center;
cursor:pointer;
min-height:60px;
}

.subs{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.player-list{
max-height:500px;
overflow-y:auto;
}

.player-item{
padding:6px;
cursor:pointer;
}

.player-item:hover{
background:#eee;
}

</style>

</head>

<body class="container py-4">

<div class="topbar">

<h3>⚽ Fantasy Dashboard</h3>

<div>

<span id="userInfo"></span>

<button id="logoutBtn" class="btn btn-sm btn-outline-danger">
Logout
</button>

</div>

</div>



<div class="card p-3 mb-3">

<h5>Next Match</h5>

<div id="nextMatchInfo"></div>

</div>



<div class="row">

<div class="col-md-3">

<div class="card p-3">

<h6>Players</h6>

<div id="playerList" class="player-list"></div>

</div>

</div>



<div class="col-md-6">

<div class="card p-3">

<h6>Predict Lineup</h6>

<div class="pitch" id="pitch"></div>

<h6 class="mt-3">Substitutions</h6>

<div class="subs" id="subs"></div>

<button class="btn btn-success mt-3 w-100" onclick="submitLineup()">
Submit Lineup Prediction
</button>

</div>

</div>



<div class="col-md-3">

<div class="card p-3">

<h6>Result Predict</h6>

<input id="homeScore" class="form-control mb-2" placeholder="Home goals">
<input id="awayScore" class="form-control mb-2" placeholder="Away goals">

<button class="btn btn-primary w-100 mb-3" onclick="generateGoals()">
Generate Goals
</button>

<div id="goalInputs"></div>

<h6 class="mt-3">Man Of The Match</h6>

<select id="motm" class="form-select"></select>

<button class="btn btn-success w-100 mt-3" onclick="submitResult()">
Submit Result Prediction
</button>

</div>

</div>

</div>



<script src="/user.js"></script>

</body>

</html>
