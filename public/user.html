<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f0fe,#f6f9ff);
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.pitch{
background:#2e7d32;
padding:20px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.player-slot{
background:white;
border-radius:8px;
padding:10px;
text-align:center;
cursor:pointer;
min-height:60px;
}

.subs{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.player-list{
max-height:500px;
overflow-y:auto;
}

.player-item{
padding:6px;
cursor:pointer;
}

.player-item:hover{
background:#eee;
}

</style>

</head>

<body class="container py-4">

<div class="topbar">

<h3>⚽ Fantasy Dashboard</h3>

<div>

<span id="userInfo"></span>

<button id="logoutBtn" class="btn btn-sm btn-outline-danger">
Logout
</button>

</div>

</div>



<div class="card p-3 mb-3">

<h5>Next Match</h5>

<div id="nextMatchInfo"></div>

</div>



<div class="row">

<div class="col-md-3">

<div class="card p-3">

<h6>Players</h6>

<div id="playerList" class="player-list"></div>

</div>

</div>



<div class="col-md-6">

<div class="card p-3">

<h6>Predict Lineup</h6>

<div class="pitch" id="pitch"></div>

<h6 class="mt-3">Substitutions</h6>

<div class="subs" id="subs"></div>

<button class="btn btn-success mt-3 w-100" onclick="submitLineup()">
Submit Lineup Prediction
</button>

</div>

</div>



<div class="col-md-3">

<div class="card p-3">

<h6>Result Predict</h6>

<input id="homeScore" class="form-control mb-2" placeholder="Home goals">
<input id="awayScore" class="form-control mb-2" placeholder="Away goals">

<button class="btn btn-primary w-100 mb-3" onclick="generateGoals()">
Generate Goals
</button>

<div id="goalInputs"></div>

<h6 class="mt-3">Man Of The Match</h6>

<select id="motm" class="form-select"></select>

<button class="btn btn-success w-100 mt-3" onclick="submitResult()">
Submit Result Prediction
</button>

</div>

</div>

</div>



<script>

const token=localStorage.getItem("token");

if(!token){
window.location.replace("/index.html");
}

let squad=[];
let selectedPlayer=null;

let lineup=new Array(11).fill(null);
let subs=new Array(5).fill(null);

let currentMatch=null;



async function loadDashboard(){

const res=await fetch("/user/dashboard",{
headers:{Authorization:"Bearer "+token}
});

const data=await res.json();

document.getElementById("userInfo").innerText=
data.user.username+" | Team: "+(data.user.selectedTeam||"not selected");

currentMatch=data.nextMatch;

if(!currentMatch){
document.getElementById("nextMatchInfo").innerHTML="No upcoming match";
return;
}

const kickoff=new Date(currentMatch.kickoff);
const deadline=new Date(kickoff.getTime()-90*60*1000);

document.getElementById("nextMatchInfo").innerHTML=`

<div>Matchday ${currentMatch.matchday}</div>
<div>${kickoff.toLocaleString()}</div>
<div>Deadline: ${deadline.toLocaleString()}</div>
<div><strong>${currentMatch.homeTeam} vs ${currentMatch.awayTeam}</strong></div>

`;

loadSquad(data.user.selectedTeam);

buildPitch();
buildSubs();

}



/* LOAD SQUAD */

async function loadSquad(team){

try{

const res = await fetch("/admin/public/teamsquads/"+team,{
headers:{ Authorization:"Bearer "+token }
});

if(!res.ok){
throw new Error("Squad request failed");
}

const data=await res.json();

console.log("Squad response:",data);

squad=data.players || data.squad || [];

if(!squad.length){
document.getElementById("playerList").innerHTML="No players found";
return;
}

renderPlayers();
renderMotm();

}catch(err){

console.error(err);
document.getElementById("playerList").innerHTML="Error loading squad";

}

}



function renderPlayers(){

const list=document.getElementById("playerList");

list.innerHTML="";

squad.forEach(p=>{

const div=document.createElement("div");

div.className="player-item";

div.innerText=p.name;

div.onclick=()=>selectedPlayer=p;

list.appendChild(div);

});

}



function renderMotm(){

const select=document.getElementById("motm");

select.innerHTML=squad.map(p=>
`<option value="${p._id}">${p.name}</option>`
).join("");

}



function buildPitch(){

const pitch=document.getElementById("pitch");

pitch.innerHTML="";

for(let i=0;i<11;i++){

const slot=document.createElement("div");

slot.className="player-slot";

slot.innerText=lineup[i]?.name||"empty";

slot.onclick=()=>{

if(selectedPlayer){
lineup[i]=selectedPlayer;
buildPitch();
}

};

pitch.appendChild(slot);

}

}



function buildSubs(){

const container=document.getElementById("subs");

container.innerHTML="";

for(let i=0;i<5;i++){

const slot=document.createElement("div");

slot.className="player-slot";

slot.innerText=subs[i]?.name||"empty";

slot.onclick=()=>{

if(selectedPlayer){
subs[i]=selectedPlayer;
buildSubs();
}

};

container.appendChild(slot);

}

}



function generateGoals(){

const home=parseInt(homeScore.value||0);

const container=document.getElementById("goalInputs");

container.innerHTML="";

for(let i=0;i<home;i++){

container.innerHTML+=`

<div class="border p-2 mb-2">

<b>Goal ${i+1}</b>

<select class="form-select mb-1">

${squad.map(p=>`<option value="${p._id}">${p.name}</option>`).join("")}

</select>

<select class="form-select mb-1">

<option>Assist</option>

${squad.map(p=>`<option value="${p._id}">${p.name}</option>`).join("")}

</select>

<label><input type="checkbox"> Is penalty</label>

<label><input type="checkbox"> Penalty earned</label>

</div>

`;

}

}



async function submitLineup(){

await fetch(`/matches/${currentMatch._id}/predict-lineup`,{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({

lineup:lineup.map(p=>p?._id),
subs:subs.map(p=>p?._id)

})

});

alert("Lineup saved");

}



async function submitResult(){

await fetch(`/matches/${currentMatch._id}/predict-result`,{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({

homeScore:homeScore.value,
awayScore:awayScore.value,
motm:document.getElementById("motm").value

})

});

alert("Result saved");

}



/* LOGOUT */

document.getElementById("logoutBtn").onclick=()=>{

localStorage.clear();

window.location.replace("/index.html");

};



loadDashboard();

</script>

</body>

</html>
