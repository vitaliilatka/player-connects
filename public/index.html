  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fe 0%, #f6f9ff 100%);
    }

    .card {
      border-radius: 16px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.06);
      background: #ffffffcc;
      backdrop-filter: blur(2px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.12);

    .card-header {
      background:#0d6efd;
      color:#fff;
      font-weight:600;
      border-radius:16px 16px 0 0;
    }

    .login-box {
      position: fixed;
      top: 15px;
      right: 20px;
      background:#ffffffcc;
      padding:10px 14px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      z-index: 999;
      width: 260px;
    }

    .login-box input {
      height:32px;
      font-size:0.85rem;
    }

    .login-box button {
      height:32px;
      font-size:0.85rem;
    }

    .league-banner {
      margin: 30px auto 10px;
      max-width: 500px;
      background: linear-gradient(90deg, #007bff, #00c4ff);
      color: white;
      padding: 8px 18px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .league-banner.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .login-success {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4caf50;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease-in-out;
      z-index: 1000;
    }

    .login-success.visible {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>

<body class="py-4">

<!-- LOGIN / REGISTER BOX -->
<div class="login-box">

  <div class="btn-group mb-2 w-100">
    <button id="showLogin" class="btn btn-sm btn-primary">Login</button>
    <button id="showRegister" class="btn btn-sm btn-outline-primary">Register</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm" class="d-flex flex-column gap-2">
    <input type="text" name="username" class="form-control form-control-sm" placeholder="Login" required>
    <input type="password" name="password" class="form-control form-control-sm" placeholder="Password" required>
    <button type="submit" class="btn btn-sm btn-primary w-100">Sign in</button>
  </form>

  <!-- REGISTER -->
  <form id="registerForm" class="d-flex flex-column gap-2 d-none">
    <input type="text" name="username" class="form-control form-control-sm" placeholder="Login" required>
    <input type="password" name="password" class="form-control form-control-sm" placeholder="Password" required>
    <button type="submit" class="btn btn-sm btn-success w-100">Sign up</button>
  </form>

</div>

<div class="container mt-3">

  <div id="league-banner" class="league-banner show">
    <h2>Welcome to Player Connects!</h2>
  </div>

<div id="login-success" class="login-success">
  ✅ Successful login!

<script>
const API_URL = "";

/* =========================
   AUTO REDIRECT IF LOGGED IN
========================= */
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (token) {
  window.location.href = role === "admin" ? "/admin.html" : "/user.html";
}

/* =========================
   TOGGLE LOGIN / REGISTER
========================= */
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

document.getElementById("showLogin").onclick = (e) => {
  e.preventDefault();
  loginForm.classList.remove("d-none");
  registerForm.classList.add("d-none");
};

document.getElementById("showRegister").onclick = (e) => {
  e.preventDefault();
  loginForm.classList.add("d-none");
  registerForm.classList.remove("d-none");
};

/* =========================
   REGISTER
========================= */
registerForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = registerForm.username.value.trim();
  const password = registerForm.password.value.trim();

  try {
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    alert("Account created! Now log in.");

    registerForm.reset();
    registerForm.classList.add("d-none");
    loginForm.classList.remove("d-none");

  } catch (err) {
    alert("❌ " + err.message);
  }
});

/* =========================
   LOGIN
========================= */
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = loginForm.username.value.trim();
  const password = loginForm.password.value.trim();

  try {
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    localStorage.setItem("role", data.role);
    localStorage.setItem("token", data.token);
    localStorage.setItem("username", username);

    showLoginSuccess();

    setTimeout(() => {
      window.location.href = data.role === "admin"
        ? "/admin.html"
        : "/user.html";
    }, 800);

  } catch (err) {
    alert("❌ " + err.message);
  }
});

/* =========================
   UI HELPERS
========================= */
function showLoginSuccess() {
  const el = document.getElementById("login-success");
  el.classList.add("visible");
  setTimeout(() => el.classList.remove("visible"), 2000);
}

<script>
document.addEventListener("DOMContentLoaded", async () => {

  try {

    const res = await fetch("/players");

    const players = await res.json();

    const topPlayers = players
      .sort((a, b) => (b.rating || 0) - (a.rating || 0))
      .slice(0, 9);

    renderPlayers(topPlayers);

  } catch (err) {

    console.error("Failed to load top players:", err);

  }

});
</script>
